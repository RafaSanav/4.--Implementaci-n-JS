<html>
    <head>
        <title>Calculadora</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    
    <body>
        <div id="bg">
            <div id="texts">
                <p id="operacion">123123</p>
                <p id="numero">123123</p>
            </div>
        
        <div id="Btns">
            <button class="GreyBtns">C</button>
            <button class="GreyBtns">AC</button>
            <button class="GreyBtns">%</button>
            <button class="OperatorBtns">/</button>
            <button class="NumberBtns">7</button>
            <button class="NumberBtns">8</button>
            <button class="NumberBtns">9</button>
            <button class="OperatorBtns">X</button>
            <button class="NumberBtns">4</button>
            <button class="NumberBtns">5</button>
            <button class="NumberBtns">6</button>
            <button class="OperatorBtns">+</button>
            <button class="NumberBtns">1</button>
            <button class="NumberBtns">2</button>
            <button class="NumberBtns">3</button>
            <button class="OperatorBtns">-</button>
            <button class="NumberBtns" id="zero">0</button>
            <button class="NumberBtns">.</button>
            <button class="OperatorBtns">=</button>
        </div>
    </div>
    </body>
    
</html>
